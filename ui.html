<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma to Elementor</title>
  <style>
    :root {
      --bg-primary:   #1e1e1e;
      --bg-secondary: #2c2c2c;
      --bg-tertiary:  #383838;
      --bg-input:     #252525;
      --border:       #444444;
      --border-focus: #6c9ef8;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0a0;
      --text-dim:     #686868;
      --accent:       #6c9ef8;
      --accent-hover: #5585e5;
      --success:      #4caf72;
      --warning:      #e6a44b;
      --error:        #e05c5c;
      --radius-sm:    4px;
      --radius-md:    6px;
      --radius-lg:    8px;
      --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono:    'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --transition:   0.15s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 12px;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-title svg { opacity: 0.7; }
    .selection-badge {
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      min-height: 14px;
    }
    .selection-badge .count {
      color: var(--accent);
      font-weight: 600;
    }
    .selection-badge .names {
      color: var(--text-dim);
      font-style: italic;
      margin-left: 2px;
    }

    /* ── Scrollable body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .body::-webkit-scrollbar { width: 4px; }
    .body::-webkit-scrollbar-track { background: transparent; }
    .body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Form section ── */
    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }
    .field:last-child { margin-bottom: 0; }
    .field label {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .field input[type="text"],
    .field input[type="url"] {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 11px;
      font-family: var(--font);
      padding: 5px 8px;
      outline: none;
      transition: border-color var(--transition);
      width: 100%;
    }
    .field input:focus {
      border-color: var(--border-focus);
    }
    .field input::placeholder { color: var(--text-dim); }

    .checkboxes {
      display: flex;
      gap: 16px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .check-item input[type="checkbox"] {
      appearance: none;
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: var(--bg-input);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition);
    }
    .check-item input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 0px;
      width: 5px;
      height: 8px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .check-item span {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ── Radio group ── */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .radio-item input[type="radio"] {
      appearance: none;
      width: 13px;
      height: 13px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      background: var(--bg-input);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition);
    }
    .radio-item input[type="radio"]:checked {
      border-color: var(--accent);
    }
    .radio-item input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }
    .radio-item span {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .radio-item span small {
      color: var(--text-dim);
      font-size: 10px;
    }

    /* ── Info note ── */
    .info-note {
      font-size: 10px;
      color: var(--text-dim);
      background: rgba(230,164,75,0.07);
      border: 1px solid rgba(230,164,75,0.2);
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      line-height: 1.5;
      margin-top: 4px;
    }

    /* ── Convert button ── */
    .btn-convert {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
      letter-spacing: 0.2px;
      flex-shrink: 0;
    }
    .btn-convert:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-convert:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-convert svg { flex-shrink: 0; }

    /* ── Progress ── */
    .progress-wrap {
      display: none;
      flex-direction: column;
      gap: 6px;
    }
    .progress-wrap.visible { display: flex; }
    .progress-step {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .progress-bar-track {
      height: 3px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.25s ease;
      width: 0%;
    }

    /* ── JSON output ── */
    .json-section {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .json-section.visible { display: flex; }
    .json-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .json-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
    }
    .json-meta {
      font-size: 10px;
      color: var(--text-dim);
    }
    .json-textarea {
      width: 100%;
      height: 140px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.5;
      padding: 8px;
      resize: none;
      outline: none;
      overflow-y: auto;
    }
    .json-textarea::-webkit-scrollbar { width: 4px; }
    .json-textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .btn-copy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 16px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
      letter-spacing: 0.2px;
    }
    .btn-copy:hover { background: var(--bg-secondary); border-color: var(--accent); color: var(--accent); }
    .btn-copy.success { background: rgba(76,175,114,0.15); border-color: var(--success); color: var(--success); }

    /* ── Instructions callout ── */
    .callout {
      display: none;
      background: rgba(108,158,248,0.08);
      border: 1px solid rgba(108,158,248,0.25);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .callout.visible { display: block; }
    .callout strong { color: var(--accent); }

    /* ── Warnings ── */
    .warnings-section {
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .warnings-section.visible { display: flex; }
    .warnings-header {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--warning);
    }
    .warnings-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .warnings-list li {
      font-size: 10px;
      color: var(--text-secondary);
      padding: 4px 8px;
      background: rgba(230,164,75,0.08);
      border-left: 2px solid var(--warning);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      line-height: 1.4;
    }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      background: rgba(224,92,92,0.12);
      border: 1px solid rgba(224,92,92,0.35);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 11px;
      color: var(--error);
      line-height: 1.4;
    }
    .error-banner.visible { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(24px);
      background: #333;
      color: var(--text-primary);
      font-size: 11px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 100;
      max-width: 340px;
      text-align: center;
      white-space: normal;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-color: var(--success); }

    /* ── Element count summary ── */
    .element-counts {
      display: none;
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
      padding: 6px 10px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    .element-counts.visible { display: block; }
    .element-counts .count-highlight { color: var(--accent); font-weight: 600; }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-hint {
      font-size: 10px;
      color: var(--text-dim);
    }
    .btn-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      transition: color var(--transition);
      font-family: var(--font);
    }
    .btn-close:hover { color: var(--text-primary); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="8" height="8" rx="1"/>
      <rect x="13" y="3" width="8" height="8" rx="1"/>
      <rect x="3" y="13" width="8" height="8" rx="1"/>
      <rect x="13" y="13" width="8" height="8" rx="1"/>
    </svg>
    Figma to Elementor
  </div>
  <div class="selection-badge" id="selectionBadge">No frames selected</div>
</div>

<div class="body" id="mainBody">

  <div class="section">
    <div class="section-label">Settings</div>

    <div class="field">
      <label for="siteUrl">WordPress Site URL</label>
      <input type="url" id="siteUrl" placeholder="https://example.com" value="https://example.com" />
    </div>

    <div class="checkboxes">
      <label class="check-item">
        <input type="checkbox" id="skipHidden" checked />
        <span>Skip hidden layers</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="exportImages" />
        <span>Export images as base64 (slower)</span>
      </label>
    </div>
    <div class="checkboxes" style="margin-top:8px;">
      <label class="check-item">
        <input type="checkbox" id="skipDecorative" />
        <span>Skip decorative elements (no text/image content)</span>
      </label>
    </div>
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Convert button -->
  <button class="btn-convert" id="btnConvert" disabled>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="16 3 21 3 21 8"/>
      <line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/>
      <line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    Convert to Elementor
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-step" id="progressStep">Analyzing...</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- JSON output -->
  <div class="json-section" id="jsonSection">
    <div class="json-header">
      <span class="json-label">Elementor JSON</span>
      <span class="json-meta" id="jsonMeta"></span>
    </div>
    <textarea class="json-textarea" id="jsonOutput" readonly spellcheck="false"></textarea>

    <button class="btn-copy" id="btnCopy">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy to Clipboard
    </button>

    <div class="element-counts" id="elementCounts"></div>

    <div class="callout" id="callout">
      <strong>How to paste in Elementor:</strong> In your Elementor editor, right-click on the canvas and select <strong>Paste from other site</strong>, then paste with Ctrl/Cmd+V.
    </div>
  </div>

  <!-- Warnings -->
  <div class="warnings-section" id="warningsSection">
    <div class="warnings-header">Conversion Warnings</div>
    <ul class="warnings-list" id="warningsList"></ul>
  </div>

</div>

<div class="footer">
  <span class="footer-hint" id="footerHint">Select frames on the canvas to begin</span>
  <button class="btn-close" id="btnClose">Close</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──
  let finalJson = '';
  let pendingImageCount = 0;
  const resolvedImages = {};
  let receivedImageCount = 0;

  // ── DOM refs ──
  const elementCounts  = document.getElementById('elementCounts');
  const selectionBadge = document.getElementById('selectionBadge');
  const btnConvert     = document.getElementById('btnConvert');
  const progressWrap   = document.getElementById('progressWrap');
  const progressStep   = document.getElementById('progressStep');
  const progressFill   = document.getElementById('progressFill');
  const jsonSection    = document.getElementById('jsonSection');
  const jsonOutput     = document.getElementById('jsonOutput');
  const jsonMeta       = document.getElementById('jsonMeta');
  const btnCopy        = document.getElementById('btnCopy');
  const callout        = document.getElementById('callout');
  const warningsSection= document.getElementById('warningsSection');
  const warningsList   = document.getElementById('warningsList');
  const errorBanner    = document.getElementById('errorBanner');
  const footerHint     = document.getElementById('footerHint');
  const toast          = document.getElementById('toast');
  const siteUrlInput      = document.getElementById('siteUrl');
  const skipHiddenBox     = document.getElementById('skipHidden');
  const exportImgBox      = document.getElementById('exportImages');
  const skipDecorativeBox = document.getElementById('skipDecorative');
  const btnClose          = document.getElementById('btnClose');

  // ── Helpers ──
  function showProgress(step, percent) {
    progressWrap.classList.add('visible');
    progressStep.textContent = step;
    progressFill.style.width = percent + '%';
  }

  function hideProgress() {
    progressWrap.classList.remove('visible');
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
    hideProgress();
    btnConvert.disabled = false;
    footerHint.textContent = 'Conversion failed';
  }

  function clearError() {
    errorBanner.classList.remove('visible');
    errorBanner.textContent = '';
  }

  function showToast(msg, type = '') {
    toast.textContent = msg;
    toast.className = 'toast' + (type ? ' ' + type : '');
    // Force reflow
    void toast.offsetWidth;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => {
      toast.classList.remove('show');
    }, 3500);
  }

  function bytesToBase64(bytes) {
    let binary = '';
    const chunk = 8192;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
  }

  function countElements(elements) {
    let sections = 0, columns = 0, widgets = 0;
    function walk(els) {
      for (const el of els) {
        if (el.elType === 'section') sections++;
        else if (el.elType === 'column') columns++;
        else if (el.elType === 'widget') widgets++;
        else if (el.elType === 'container') sections++; // containers count as sections
        if (el.elements && el.elements.length) walk(el.elements);
      }
    }
    walk(elements);
    return { sections, columns, widgets };
  }

  function showElementCounts(elements) {
    const { sections, columns, widgets } = countElements(elements);
    const parts = [];
    if (sections > 0) parts.push(`<span class="count-highlight">${sections}</span> section${sections !== 1 ? 's' : ''}`);
    if (columns > 0)  parts.push(`<span class="count-highlight">${columns}</span> column${columns !== 1 ? 's' : ''}`);
    if (widgets > 0)  parts.push(`<span class="count-highlight">${widgets}</span> widget${widgets !== 1 ? 's' : ''}`);
    if (parts.length === 0) {
      elementCounts.innerHTML = '<span style="color:var(--warning)">Warning: 0 elements generated — try selecting content frames inside the artboard.</span>';
    } else {
      elementCounts.innerHTML = 'Generated: ' + parts.join(', ');
    }
    elementCounts.classList.add('visible');
  }

  function resolveAndDisplay() {
    let json = finalJson;
    for (const [placeholder, dataUrl] of Object.entries(resolvedImages)) {
      // Escape the placeholder for use in a regex
      const escaped = placeholder.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      json = json.replace(new RegExp(escaped, 'g'), dataUrl);
    }
    jsonOutput.value = json;
    const kb = Math.round(json.length / 1024);
    jsonMeta.textContent = kb + ' KB';
    hideProgress();
    jsonSection.classList.add('visible');
    btnConvert.disabled = false;
    footerHint.textContent = 'Ready — copy and paste into Elementor';
  }

  function displayWarnings(warnings) {
    if (!warnings || warnings.length === 0) {
      warningsSection.classList.remove('visible');
      return;
    }
    warningsList.innerHTML = '';
    warnings.forEach(w => {
      const li = document.createElement('li');
      li.textContent = w;
      warningsList.appendChild(li);
    });
    warningsSection.classList.add('visible');
  }

  // ── Message handler ──
  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    switch (msg.type) {
      case 'selection-changed': {
        const count = msg.count || 0;
        if (count === 0) {
          selectionBadge.innerHTML = 'No frames selected';
          btnConvert.disabled = true;
          footerHint.textContent = 'Select frames on the canvas to begin';
        } else {
          const names = (msg.names || []).slice(0, 3).join(', ');
          const more  = msg.names.length > 3 ? ` +${msg.names.length - 3} more` : '';
          selectionBadge.innerHTML =
            `<span class="count">${count}</span> frame${count !== 1 ? 's' : ''} selected` +
            `<span class="names"> — ${names}${more}</span>`;
          btnConvert.disabled = false;
          footerHint.textContent = 'Ready to convert';
        }
        break;
      }

      case 'progress': {
        showProgress(msg.step, msg.percent);
        break;
      }

      case 'image-bytes': {
        const bytes = new Uint8Array(msg.bytes);
        const base64 = bytesToBase64(bytes);
        resolvedImages[msg.placeholder] = 'data:image/png;base64,' + base64;
        receivedImageCount++;
        if (receivedImageCount >= pendingImageCount) {
          resolveAndDisplay();
        }
        break;
      }

      case 'json-ready': {
        finalJson = JSON.stringify(msg.payload, null, 2);
        pendingImageCount = msg.pendingImages || 0;
        receivedImageCount = 0;

        displayWarnings(msg.warnings);
        showElementCounts(msg.payload.elements || []);

        if (pendingImageCount === 0) {
          resolveAndDisplay();
        } else {
          showProgress(`Waiting for ${pendingImageCount} image(s)...`, 90);
        }
        break;
      }

      case 'error': {
        showError(msg.message);
        break;
      }
    }
  };

  // ── Convert ──
  btnConvert.addEventListener('click', () => {
    clearError();
    jsonSection.classList.remove('visible');
    callout.classList.remove('visible');
    warningsSection.classList.remove('visible');
    elementCounts.classList.remove('visible');
    btnCopy.classList.remove('success');
    btnCopy.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy to Clipboard`;
    btnConvert.disabled = true;
    showProgress('Analyzing frames...', 5);
    footerHint.textContent = 'Converting...';

    parent.postMessage({
      pluginMessage: {
        type: 'convert',
        options: {
          exportImages: exportImgBox.checked,
          siteUrl: siteUrlInput.value.trim() || 'https://example.com',
          skipHidden: skipHiddenBox.checked,
          headingThreshold: 20,
          skipDecorative: skipDecorativeBox.checked,
        },
      },
    }, '*');
  });

  // ── Copy ──
  btnCopy.addEventListener('click', () => {
    const text = jsonOutput.value;
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
      btnCopy.classList.add('success');
      btnCopy.innerHTML = `
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Copied!`;
      callout.classList.add('visible');
      showToast('Copied! In Elementor: right-click canvas → Paste from other site', 'success');

      setTimeout(() => {
        btnCopy.classList.remove('success');
        btnCopy.innerHTML = `
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy to Clipboard`;
      }, 3000);
    }).catch(() => {
      // Fallback: select text in textarea for manual copy
      jsonOutput.select();
      showToast('Auto-copy failed — text selected, press Ctrl/Cmd+C', '');
    });
  });

  // ── Close ──
  btnClose.addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });
</script>
</body>
</html>
